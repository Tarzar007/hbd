<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday! 🎂</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff5f8 0%, #fef3ff 50%, #f0f9ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', sans-serif;
      overflow: hidden;
      position: relative;
      transition: background 1.4s ease
    }

    body.dark-mode {
      background: radial-gradient(ellipse at 20% 20%, #1a0a2e 0%, #0d0515 40%, #000008 100%)
    }

    h2.sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0)
    }

    canvas#stars-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.6s ease
    }

    body.dark-mode canvas#stars-canvas {
      opacity: 1
    }

    canvas#fireworks {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 5;
      padding: 20px
    }

    .title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(28px, 6vw, 48px);
      color: #e91e8c;
      margin-bottom: 8px;
      text-align: center;
      animation: floatIn 1s ease forwards;
      transition: color 1.2s ease, text-shadow 1.2s ease
    }

    body.dark-mode .title {
      color: #ff6ec7;
      text-shadow: 0 0 30px rgba(255, 110, 199, 0.8), 0 0 70px rgba(255, 80, 180, 0.35)
    }

    .subtitle {
      font-size: clamp(12px, 3vw, 15px);
      color: #c084fc;
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 24px;
      animation: floatIn 1.2s ease forwards;
      transition: color 1.2s ease, text-shadow 1.2s ease
    }

    body.dark-mode .subtitle {
      color: #c084fc;
      text-shadow: 0 0 20px rgba(192, 132, 252, 0.9)
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(-20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .cake-wrap {
      position: relative;
      cursor: default
    }

    .cake-svg {
      width: clamp(200px, 55vw, 300px);
      height: auto;
      filter: drop-shadow(0 8px 24px rgba(233, 30, 140, 0.15));
      transition: filter 1.2s ease
    }

    body.dark-mode .cake-svg {
      filter: drop-shadow(0 8px 40px rgba(255, 110, 199, 0.5)) drop-shadow(0 0 24px rgba(200, 100, 255, 0.35))
    }

    .flame {
      animation: flicker 0.4s ease-in-out infinite alternate;
      transform-origin: 50% 100%
    }

    .flame-inner {
      animation: flicker2 0.3s ease-in-out infinite alternate;
      transform-origin: 50% 100%
    }

    @keyframes flicker {
      0% {
        transform: scaleX(1) scaleY(1) rotate(-2deg)
      }

      100% {
        transform: scaleX(0.85) scaleY(0.95) rotate(2deg)
      }
    }

    @keyframes flicker2 {
      0% {
        transform: scaleX(0.7) scaleY(0.8) rotate(1deg)
      }

      100% {
        transform: scaleX(0.9) scaleY(1) rotate(-1deg)
      }
    }

    .flame.out,
    .flame-inner.out {
      display: none
    }

    .smoke {
      display: none;
      animation: smokeRise 1.5s ease-out forwards
    }

    .smoke.show {
      display: block
    }

    @keyframes smokeRise {
      0% {
        opacity: 0.7;
        transform: translateY(0) scaleX(1)
      }

      100% {
        opacity: 0;
        transform: translateY(-30px) scaleX(2.5)
      }
    }

    .btn-blow {
      margin-top: 20px;
      background: linear-gradient(135deg, #f472b6, #e879f9);
      color: white;
      border: none;
      padding: clamp(10px, 3vw, 14px) clamp(24px, 6vw, 40px);
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-size: clamp(13px, 3.5vw, 16px);
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 20px rgba(244, 114, 182, 0.4);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.4s;
      animation: pulseBtn 2s ease-in-out infinite
    }

    .btn-blow:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(244, 114, 182, 0.55)
    }

    .btn-blow:active {
      transform: scale(0.97)
    }

    @keyframes pulseBtn {

      0%,
      100% {
        box-shadow: 0 4px 20px rgba(244, 114, 182, 0.4)
      }

      50% {
        box-shadow: 0 4px 32px rgba(244, 114, 182, 0.7)
      }
    }

    .btn-blow.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.8)
    }

    /* === CARD OVERLAY === */
    .card-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 240, 250, 0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s, background 1.4s ease
    }

    .card-overlay.show {
      opacity: 1;
      pointer-events: all
    }

    body.dark-mode .card-overlay {
      background: rgba(5, 0, 18, 0.82)
    }

    .birthday-card {
      background: white;
      border-radius: 24px;
      padding: clamp(24px, 6vw, 40px);
      max-width: min(90vw, 420px);
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(233, 30, 140, 0.18), 0 0 0 1px rgba(233, 30, 140, 0.08);
      transform: scale(0.7) translateY(40px);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s,
        background 1.2s ease, box-shadow 1.2s ease;
      opacity: 0;
      position: relative;
      overflow: hidden
    }

    .birthday-card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(244, 114, 182, 0.12), transparent);
      border-radius: 50%
    }

    .birthday-card::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: -30px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(192, 132, 252, 0.12), transparent);
      border-radius: 50%
    }

    .card-overlay.show .birthday-card {
      transform: scale(1) translateY(0);
      opacity: 1
    }

    body.dark-mode .birthday-card {
      background: #120820;
      box-shadow: 0 20px 80px rgba(200, 80, 255, 0.3), 0 0 0 1px rgba(200, 100, 255, 0.18),
        inset 0 0 60px rgba(150, 50, 200, 0.06)
    }

    .card-icon {
      font-size: 48px;
      margin-bottom: 12px
    }

    .card-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(26px, 7vw, 38px);
      color: #e91e8c;
      margin-bottom: 16px;
      transition: color 1.2s ease, text-shadow 1.2s ease
    }

    body.dark-mode .card-title {
      color: #ff6ec7;
      text-shadow: 0 0 24px rgba(255, 110, 199, 0.7)
    }

    .card-body {
      font-size: clamp(13px, 3.5vw, 15px);
      line-height: 1.8;
      color: #7c3aed;
      margin-bottom: 20px;
      transition: color 1.2s ease
    }

    body.dark-mode .card-body {
      color: #d4aaff
    }

    .card-sign {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(18px, 4vw, 22px);
      color: #f472b6;
      transition: color 1.2s ease, text-shadow 1.2s ease
    }

    body.dark-mode .card-sign {
      color: #ff8ad4;
      text-shadow: 0 0 16px rgba(255, 138, 212, 0.6)
    }

    .card-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f472b6, #e879f9)
    }

    .btn-close {
      background: linear-gradient(135deg, #f472b6, #e879f9);
      border: none;
      color: white;
      padding: 10px 32px;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      margin-top: 8px;
      box-shadow: 0 4px 18px rgba(244, 114, 182, 0.45);
      letter-spacing: 0.04em
    }

    .btn-close:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 28px rgba(244, 114, 182, 0.6)
    }

    .btn-close:active {
      transform: scale(0.95)
    }

    body.dark-mode .btn-close {
      box-shadow: 0 4px 24px rgba(255, 100, 200, 0.6), 0 0 40px rgba(200, 80, 255, 0.3)
    }

    @keyframes boomShake {
      0% {
        transform: scale(1) translateY(0)
      }

      15% {
        transform: scale(1.18) translateY(-6px) rotate(-3deg)
      }

      30% {
        transform: scale(0.92) translateY(2px) rotate(3deg)
      }

      45% {
        transform: scale(1.1) translateY(-3px) rotate(-2deg)
      }

      60% {
        transform: scale(0.96) translateY(1px) rotate(1deg)
      }

      80% {
        transform: scale(1.04) translateY(-1px)
      }

      100% {
        transform: scale(1) translateY(0)
      }
    }

    .card-overlay.boom-shake .birthday-card {
      animation: boomShake 0.55s cubic-bezier(0.36, 0.07, 0.19, 0.97)
    }

    /* === FLOATING FIREWORK EMOJI === */
    .float-firework {
      position: fixed;
      pointer-events: none;
      z-index: 25;
      animation: floatUp var(--dur, 2.8s) ease-out var(--delay, 0s) forwards;
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg)
      }

      25% {
        opacity: 1;
        transform: translateY(-20vh) scale(1.2) rotate(12deg)
      }

      60% {
        opacity: 0.8;
        transform: translateY(-58vh) scale(1.0) rotate(-8deg)
      }

      100% {
        opacity: 0;
        transform: translateY(-92vh) scale(0.6) rotate(22deg)
      }
    }

    @media(max-width:400px) {
      .cake-svg {
        width: 180px
      }
    }
  </style>
</head>

<body>

    <div class="cake-wrap">

  <div class="card-overlay" id="cardOverlay">

      <div class="card-icon">🎉</div>

        มีความสุขมากๆนะครับคูมข้าว<br>
        คิดสิ่งใดอยู่ก็ขอให้สมคำปราถนา<br>
        ขอให้ทุกความฝันของข้าวเป็นจริง<br>

  <script>
    /* ===== CANVAS ===== */
    const fwCanvas = document.getElementById('fireworks');
    const fwCtx = fwCanvas.getContext('2d');
    const stCanvas = document.getElementById('stars-canvas');
    const stCtx = stCanvas.getContext('2d');

    let particles = [], fwAnimating = false;
    let stars = [], stAnimating = false;

    function resize() {
      fwCanvas.width = stCanvas.width = window.innerWidth;
      fwCanvas.height = stCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function rand(a, b) { return Math.random() * (b - a) + a; }

    /* ===== STARS ===== */
    function initStars() {
      stars = [];
      for (let i = 0; i < 180; i++) {
        stars.push({
          x: rand(0, stCanvas.width),
          y: rand(0, stCanvas.height),
          r: rand(0.4, 1.9),
          a: rand(0.3, 1),
          da: rand(0.004, 0.014) * (Math.random() > 0.5 ? 1 : -1)
        });
      }
    }

    function drawStars() {
      stCtx.clearRect(0, 0, stCanvas.width, stCanvas.height);
      for (const s of stars) {
        s.a += s.da;
        if (s.a > 1 || s.a < 0.1) s.da *= -1;
        stCtx.beginPath();
        stCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        stCtx.fillStyle = `rgba(255,255,255,${Math.max(0.05, Math.min(1, s.a))})`;
        stCtx.fill();
      }
    }

    function runStars() {
      if (!stAnimating) return;
      drawStars();
      requestAnimationFrame(runStars);
    }

    /* ===== FIREWORK PARTICLES ===== */
    function createBurst(x, y, count) {
      const colors = ['#f472b6', '#e879f9', '#fbbf24', '#34d399', '#60a5fa', '#fb7185', '#a78bfa', '#fff', '#ffec6e', '#80ffdb'];
      for (let i = 0; i < (count || 80); i++) {
        const angle = rand(0, Math.PI * 2);
        const speed = rand(2, 9);
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - rand(1, 3),
          color: colors[Math.floor(rand(0, colors.length))],
          alpha: 1, size: rand(3, 7),
          decay: rand(0.012, 0.022), gravity: 0.12
        });
      }
    }

    function launchFireworks(count) {
      let launched = 0;
      const iv = setInterval(() => {
        const x = rand(fwCanvas.width * 0.15, fwCanvas.width * 0.85);
        const y = rand(fwCanvas.height * 0.1, fwCanvas.height * 0.5);
        createBurst(x, y, 80);
        if (++launched >= (count || 7)) clearInterval(iv);
      }, 220);
    }

    function runParticles() {
      fwAnimating = true;
      fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
      particles = particles.filter(p => p.alpha > 0.02);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        p.vy += p.gravity; p.vx *= 0.98;
        p.alpha -= p.decay;
        fwCtx.save();
        fwCtx.globalAlpha = Math.max(0, p.alpha);
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        fwCtx.fillStyle = p.color;
        fwCtx.fill();
        fwCtx.restore();
      }
      if (particles.length > 0) requestAnimationFrame(runParticles);
      else { fwAnimating = false; fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height); }
    }

    /* ===== MUSIC ===== */
    function playMusic() {
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        const notes = [523, 587, 659, 523, 659, 784, 880, 784, 698, 659, 523, 587, 523];
        const dur = [0.3, 0.3, 0.6, 0.3, 0.3, 0.6, 0.3, 0.3, 0.3, 0.3, 0.6, 0.3, 0.7];
        let t = ac.currentTime + 0.1;
        notes.forEach((freq, i) => {
          const o = ac.createOscillator(), g = ac.createGain();
          o.connect(g); g.connect(ac.destination);
          o.type = 'sine'; o.frequency.value = freq;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.22, t + 0.04);
          g.gain.linearRampToValueAtTime(0, t + dur[i] - 0.04);
          o.start(t); o.stop(t + dur[i]); t += dur[i];
        });
      } catch (e) { }
    }

    /* ===== FIREWORK SOUND ===== */
    function playFireworkSound() {
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        function boom(delay) {
          const osc = ac.createOscillator(), gain = ac.createGain();
          osc.connect(gain); gain.connect(ac.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(120, ac.currentTime + delay);
          osc.frequency.exponentialRampToValueAtTime(30, ac.currentTime + delay + 0.3);
          gain.gain.setValueAtTime(0.6, ac.currentTime + delay);
          gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.4);
          osc.start(ac.currentTime + delay); osc.stop(ac.currentTime + delay + 0.4);

          const buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
          const src = ac.createBufferSource(); src.buffer = buf;
          const bpf = ac.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = 2200; bpf.Q.value = 0.7;
          const ng = ac.createGain();
          ng.gain.setValueAtTime(0.55, ac.currentTime + delay);
          ng.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.35);
          src.connect(bpf); bpf.connect(ng); ng.connect(ac.destination);
          src.start(ac.currentTime + delay); src.stop(ac.currentTime + delay + 0.35);

          [1800, 2200, 2600, 3000, 1400].forEach((f, idx) => {
            const so = ac.createOscillator(), sg = ac.createGain();
            so.connect(sg); sg.connect(ac.destination); so.type = 'sine'; so.frequency.value = f;
            const t0 = ac.currentTime + delay + idx * 0.04;
            sg.gain.setValueAtTime(0, t0); sg.gain.linearRampToValueAtTime(0.08, t0 + 0.02);
            sg.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
            so.start(t0); so.stop(t0 + 0.2);
          });
        }
        [0, 0.28, 0.52, 0.78, 1.05, 1.32, 1.60].forEach(d => boom(d));
      } catch (e) { }
    }

    /* ===== FLOATING EMOJI FIREWORKS ===== */
    const EMOJIS = ['🎆', '🎇', '✨', '🌟', '💥', '🎉', '🎊', '⭐', '🌠', '💫', '🔥', '🌸', '🪄'];

    function spawnFloaters(count, delayOffset) {
      delayOffset = delayOffset || 0;
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'float-firework';
          el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
          el.style.left = rand(3, 92) + 'vw';
          el.style.top = rand(55, 90) + 'vh';
          el.style.fontSize = rand(22, 54) + 'px';
          el.style.setProperty('--dur', rand(2.4, 4.0) + 's');
          el.style.setProperty('--delay', rand(0, 0.5) + 's');
          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }, delayOffset + i * 70);
      }
    }

    /* ===== BLOW CANDLE ===== */
    function blowCandle() {
      document.getElementById('flameOuter').classList.add('out');
      document.getElementById('flameInner').classList.add('out');
      document.getElementById('smoke').classList.add('show');
      document.getElementById('blowBtn').classList.add('hidden');
      playMusic();
      setTimeout(() => { launchFireworks(7); if (!fwAnimating) runParticles(); }, 400);
      setTimeout(() => { document.getElementById('cardOverlay').classList.add('show'); }, 1800);
    }

    /* ===== BOOMM ===== */
    function handleBoomm() {
      const overlay = document.getElementById('cardOverlay');

      // 1. เสียงพลุ
      playFireworkSound();

      // 2. โทนมืด + ดาว
      document.body.classList.add('dark-mode');
      initStars();
      stAnimating = true;
      runStars();

      // 3. particle พลุหนักๆ
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          const x = rand(fwCanvas.width * 0.08, fwCanvas.width * 0.92);
          const y = rand(fwCanvas.height * 0.05, fwCanvas.height * 0.55);
          createBurst(x, y, 140);
          if (!fwAnimating) runParticles();
        }, i * 160);
      }

      // 4. พลุ emoji ลอยขึ้น 3 รอบ
      spawnFloaters(18, 0);
      spawnFloaters(14, 700);
      spawnFloaters(10, 1500);

      // 5. shake
      overlay.classList.remove('boom-shake');
      void overlay.offsetWidth;
      overlay.classList.add('boom-shake');
      setTimeout(() => overlay.classList.remove('boom-shake'), 600);

      // 6. ปิดการ์ด
      setTimeout(() => { overlay.classList.remove('show'); }, 2400);
    }
  </script>
